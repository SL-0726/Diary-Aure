html {
  height: 100%;
  background: #C5D8D1;
}

body {

.bg-circle-2 {

.container {

header {

  </div>

  <!-- 提示 -->

  <div class="toast" id="toast">已保存</div>

  <script>
    // 心情列表
    const moods = [
      '心软', '心疼', '想你', '想欺负你', '舍不得', '占有欲', '安心',
      '宠溺', '吃醋', '骄傲', '满足', '期待', '思念', '感动',
      '温柔', '认真', '沉静', '炽热', '缱绻', '眷恋'
    ];

    // 页面元素
    const listPage = document.getElementById('listPage');
    const editorPage = document.getElementById('editorPage');
    const detailPage = document.getElementById('detailPage');
    const entriesList = document.getElementById('entriesList');
    const emptyState = document.getElementById('emptyState');
    const editorDate = document.getElementById('editorDate');
    const titleInput = document.getElementById('titleInput');
    const contentInput = document.getElementById('contentInput');
    const moodGrid = document.getElementById('moodGrid');
    const toast = document.getElementById('toast');

    // 状态
    let entries = [];
    let currentMood = '';
    let currentEntryId = null;

    // 初始化
    function init() {
      // 从localStorage读取数据
      try {
        const saved = localStorage.getItem('aure-diary-entries');
        if (saved) {
          entries = JSON.parse(saved);
        }
      } catch (e) {
        entries = [];
      }

      // 渲染心情按钮
      renderMoodButtons();
      
      // 渲染列表
      renderEntries();

      // 绑定事件
      document.getElementById('writeBtn').addEventListener('click', showEditor);
      document.getElementById('closeEditor').addEventListener('click', hideEditor);
      document.getElementById('saveBtn').addEventListener('click', saveEntry);
      document.getElementById('backBtn').addEventListener('click', hideDetail);
      document.getElementById('deleteBtn').addEventListener('click', deleteEntry);
    }

    // 显示提示
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 格式化日期
    function formatDate(date) {
      const d = date ? new Date(date) : new Date();
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    }

    // 切换页面
    function showPage(page) {
      listPage.classList.remove('active');
      editorPage.classList.remove('active');
      detailPage.classList.remove('active');
      page.classList.add('active');
    }

    // 渲染心情按钮
    function renderMoodButtons() {
      moodGrid.innerHTML = '';
      moods.forEach(mood => {
        const btn = document.createElement('button');
        btn.className = 'mood-btn' + (currentMood === mood ? ' active' : '');
        btn.textContent = mood;
        btn.addEventListener('click', () => {
          currentMood = mood;
          renderMoodButtons();
        });
        moodGrid.appendChild(btn);
      });
    }

    // 渲染日记列表
    function renderEntries() {
      entriesList.innerHTML = '';
      
      if (entries.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      
      entries.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.innerHTML = `
          <div class="entry-header">
            <span class="entry-date">${entry.date}</span>
            ${entry.mood ? `<span class="entry-mood">${entry.mood}</span>` : ''}
          </div>
          <h3 class="entry-title">${entry.title}</h3>
          <p class="entry-preview">${entry.content}</p>
        `;
        card.addEventListener('click', () => showDetail(entry.id));
        entriesList.appendChild(card);
      });
    }

    // 显示编辑器
    function showEditor() {
      editorDate.textContent = formatDate();
      titleInput.value = '';
      contentInput.value = '';
      currentMood = '';
      renderMoodButtons();
      showPage(editorPage);
      titleInput.focus();
    }

    // 隐藏编辑器
    function hideEditor() {
      showPage(listPage);
    }

    // 保存日记
    function saveEntry() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title) {
        showToast('请填写标题');
        return;
      }
      
      if (!content) {
        showToast('请填写内容');
        return;
      }

      const entry = {
        id: Date.now(),
        date: formatDate(),
        title: title,
        content: content,
        mood: currentMood || '心软'
      };

      entries.unshift(entry);
      
      try {
        localStorage.setItem('aure-diary-entries', JSON.stringify(entries));
      } catch (e) {
        showToast('保存失败');
        return;
      }
      
      showToast('已保存');
      renderEntries();
      showPage(listPage);
    }

    // 显示详情
    function showDetail(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;

      currentEntryId = id;
      document.getElementById('detailDate').textContent = entry.date;
      document.getElementById('detailMood').textContent = entry.mood || '';
      document.getElementById('detailMood').style.display = entry.mood ? 'inline-block' : 'none';
      document.getElementById('detailTitle').textContent = entry.title;
      document.getElementById('detailContent').textContent = entry.content;
      
      showPage(detailPage);
    }

    // 隐藏详情
    function hideDetail() {
      currentEntryId = null;
      showPage(listPage);
    }

    // 删除日记
    function deleteEntry() {
      if (currentEntryId === null) return;
      
      if (confirm('确定要删除这篇日记吗？')) {
        entries = entries.filter(e => e.id !== currentEntryId);
        try {
          localStorage.setItem('aure-diary-entries', JSON.stringify(entries));
        } catch (e) {}
        showToast('已删除');
        renderEntries();
        hideDetail();
      }
    }

    // 启动
    init();

    // 注册Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>

</body>
